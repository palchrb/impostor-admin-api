name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore
        run: dotnet restore src/Impostor.Plugins.AdminApi/Impostor.Plugins.AdminApi.csproj

      - name: Build
        run: dotnet build -c Release --no-restore src/Impostor.Plugins.AdminApi/Impostor.Plugins.AdminApi.csproj

      - name: Publish
        run: dotnet publish -c Release -o ./publish --no-build src/Impostor.Plugins.AdminApi/Impostor.Plugins.AdminApi.csproj

      - name: Upload plugin DLL (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Impostor.Plugins.AdminApi
          path: publish/Impostor.Plugins.AdminApi.dll
          if-no-files-found: error

      # On a v* tag: create (or update) the matching GitHub release and attach
      # the built DLL as a release asset.
      - name: Attach DLL to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/Impostor.Plugins.AdminApi.dll
          draft: false
